<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scroll Sections — Preview interno</title>
<style>
  html, body { margin: 0; height: 100%; background: #111; font-family: Arial, sans-serif; }
  #picker { position: fixed; top: 0; left: 0; right: 0; z-index: 10; background: #1a1a1e; padding: 10px 16px; display: flex; gap: 10px; align-items: center; }
  #picker select, #picker button { padding: 6px 10px; font-size: 14px; }
  #picker span { color: #aaa; font-size: 12px; }
  #frame { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; border: 0; width: 100%; height: calc(100% - 44px); background: #000; }
</style>
</head>
<body>
  <div id="picker">
    <span>Scroll Sections — preview interno (solo QA local, no forma parte del panel final):</span>
    <select id="tplSelect"></select>
  </div>
  <iframe id="frame"></iframe>

  <script src="js/core.js"></script>
  <script src="js/scroll-sections.js"></script>
  <script src="js/scroll-sections/elastic-grid-scroll.js"></script>
  <script src="js/scroll-sections/rotating-onscroll.js"></script>
  <script src="js/scroll-sections/scroll-text-motion.js"></script>
  <script src="js/scroll-sections/draggable-grid.js"></script>
  <script src="js/scroll-sections/connected-grid.js"></script>
  <script>
    // Demo media reused from EP.DemoAssets (Unsplash, already used elsewhere in the app)
    var DEMO_MEDIA = [
      { type: 'image', url: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=900&q=80', name: 'Casa exterior' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=900&q=80', name: 'Fachada moderna' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=900&q=80', name: 'Interior sala' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=900&q=80', name: 'Villa premium' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=900&q=80', name: 'Casa jardín' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1583608205776-bfd35f0d9f83?w=900&q=80', name: 'Exterior piscina' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=900&q=80', name: 'Edificio urbano' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1464938050520-ef2270bb8ce8?w=900&q=80', name: 'Interior minimalista' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=900&q=80', name: 'Oficina moderna' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=900&q=80', name: 'Sala diseño' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=900&q=80', name: 'Cocina premium' },
      { type: 'image', url: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=900&q=80', name: 'Reloj premium' }
    ];

    var select = document.getElementById('tplSelect');
    var frame = document.getElementById('frame');
    var templates = EP.ScrollSections.getAll();

    templates.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.icon + ' ' + t.name;
      select.appendChild(opt);
    });

    function render(id) {
      var html = EP.ScrollSections.buildDocument(id, DEMO_MEDIA, { title: 'Escaparates Pro' });
      frame.srcdoc = html;
    }

    select.addEventListener('change', function() { render(select.value); });

    var params = new URLSearchParams(location.search);
    var initial = params.get('tpl') || (templates[0] && templates[0].id);
    if (initial) { select.value = initial; render(initial); }
  </script>
</body>
</html>
