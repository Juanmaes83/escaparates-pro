name: Phase 1 Studio QA

on:
  pull_request:
    paths:
      - 'review/premium-storytelling-phase1-studio.html'
      - 'review/phase1-studio-v2.css'
      - 'review/phase1-studio-v2.js'
      - 'tests/phase1-playwright.config.mjs'
      - 'tests/phase1-studio.spec.mjs'
      - '.github/workflows/phase1-studio-qa.yml'
  workflow_dispatch:

jobs:
  browser-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test@1.53.1
          npx playwright install --with-deps chromium
      - name: Run Phase 1 browser QA
        run: npx playwright test --config=tests/phase1-playwright.config.mjs
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-studio-playwright-report
          path: |
            tests/phase1-results.json
            tests/test-results/
          if-no-files-found: warn