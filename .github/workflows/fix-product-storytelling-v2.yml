name: Fix Product Storytelling V2

on:
  push:
    branches:
      - feature/premium-storytelling-pack-v2-source-faithful
    paths:
      - .github/workflows/fix-product-storytelling-v2.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/premium-storytelling-pack-v2-source-faithful
          fetch-depth: 0
      - name: Repair invalid React style prop
        shell: python
        run: |
          from pathlib import Path
          path = Path('labs/source-experiences/product-storytelling-source-faithful/index.html')
          text = path.read_text(encoding='utf-8')
          bad = '<span style="font-weight:900;font-size:14px">A</span>'
          good = '<span style={{ fontWeight: 900, fontSize: "14px" }}>A</span>'
          if bad not in text:
              raise SystemExit('Expected invalid style prop not found')
          path.write_text(text.replace(bad, good, 1), encoding='utf-8')
      - name: Commit repair and remove one-off workflow
        run: |
          rm .github/workflows/fix-product-storytelling-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add labs/source-experiences/product-storytelling-source-faithful/index.html .github/workflows/fix-product-storytelling-v2.yml
          git commit -m "fix(product): repair React style prop in source-faithful viewer"
          git push origin HEAD:feature/premium-storytelling-pack-v2-source-faithful