name: Phase 2 Railway Smoke

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Railway API base URL, including https://'
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify Railway public endpoints
        run: node tools/phase2/railway-smoke.mjs "${{ inputs.api_base_url }}"
