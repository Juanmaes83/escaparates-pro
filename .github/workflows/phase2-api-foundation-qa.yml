name: Phase 2 API Foundation QA

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/phase2-api-foundation-qa.yml'
  workflow_dispatch:

jobs:
  api-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - name: Install API dependencies
        run: npm ci
      - name: Typecheck API
        run: npm run typecheck
      - name: Run API tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee api-test-output.log
      - name: Validate additive migration
        shell: bash
        run: |
          test -f migrations/019_create_project_cloud_foundation.sql
          awk 'BEGIN{down=0} /^-- DOWN/{down=1} !down{print}' migrations/019_create_project_cloud_foundation.sql > /tmp/phase2-up.sql
          if grep -Eiq 'DROP TABLE|DROP COLUMN|TRUNCATE|DELETE FROM projects' /tmp/phase2-up.sql; then
            echo 'Destructive statement detected in migration UP section'
            exit 1
          fi
          grep -q 'project_cloud_metadata' /tmp/phase2-up.sql
          grep -q 'project_assets' /tmp/phase2-up.sql
          grep -q 'project_publications' /tmp/phase2-up.sql
      - name: Upload API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-api-foundation-diagnostics
          path: apps/api/api-test-output.log
          if-no-files-found: ignore
