name: Wire Premium Custom V2

on:
  push:
    branches:
      - feature/premium-storytelling-pack-v2-source-faithful
    paths:
      - .github/workflows/wire-custom-premium-v2.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/premium-storytelling-pack-v2-source-faithful
          fetch-depth: 0
      - name: Register scripts, schemas and catalog entries
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:90]}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'index.html',
              '    <script src="js/scroll-sections/real-estate-storytelling-source-faithful.js"></script>\n    <script src="js/scroll-sections/product-storytelling-source-faithful.js"></script>\n    <script src="js/scroll-sections-ui.js"></script>',
              '    <script src="js/scroll-sections/real-estate-storytelling-source-faithful.js"></script>\n    <script src="js/scroll-sections/product-storytelling-source-faithful.js"></script>\n    <script src="js/scroll-sections/real-estate-storytelling-custom-pro.js"></script>\n    <script src="js/scroll-sections/product-storytelling-custom-pro.js"></script>\n    <script src="js/scroll-sections-ui.js"></script>'
          )
          replace_once(
              'index.html',
              '    <script src="js/sector-blueprints/luxury-real-estate-source-faithful.js"></script>\n    <script src="js/sector-blueprints-ui.js"></script>',
              '    <script src="js/sector-blueprints/luxury-real-estate-source-faithful.js"></script>\n    <script src="js/sector-blueprints/luxury-real-estate-custom-pro.js"></script>\n    <script src="js/sector-blueprints-ui.js"></script>'
          )
          replace_once(
              'js/scroll-sections-ui.js',
              '    function getSchema(id) { return FIELD_SCHEMAS[id] || []; }',
              '    function getSchema(id) { var tpl = EP.ScrollSections.get(id); return FIELD_SCHEMAS[id] || (tpl && tpl.schema ? tpl.schema : []); }'
          )
          replace_once(
              'js/scroll-sections-ui.js',
              "            noteEl.innerHTML = tpl.sourceUrl\n                ? 'Técnica adaptada de <a href=\"' + tpl.sourceUrl + '\" target=\"_blank\" rel=\"noopener\">' + tpl.sourceUrl.replace('https://', '') + '</a>. Los textos y la media se sustituyen por los tuyos.'\n                : '';",
              "            var slots = tpl.mediaSlots && tpl.mediaSlots.length ? '<br><strong>Media slots:</strong> ' + tpl.mediaSlots.map(function(s,i){ return (i+1) + '. ' + s; }).join(' · ') : '';\n            noteEl.innerHTML = (tpl.sourceUrl\n                ? 'Técnica adaptada de <a href=\"' + tpl.sourceUrl + '\" target=\"_blank\" rel=\"noopener\">' + tpl.sourceUrl.replace('https://', '') + '</a>. Los textos y la media se sustituyen por los tuyos.'\n                : (tpl.schema ? 'Plantilla premium editable desde este panel.' : '')) + slots;"
          )
          replace_once(
              'js/sector-blueprints.js',
              "        { id:'luxury-real-estate-source-faithful', icon:'LF', sector:'Inmobiliaria Premium', name:'Luxury Real Estate — Source Faithful PRO', accent:'#c9a96e', title:'Vive Sin Límites', cta:'Solicitar visita', points:['Fuente original preservada','Vídeo cinematográfico','Experiencia completa'] },",
              "        { id:'luxury-real-estate-source-faithful', icon:'LF', sector:'Inmobiliaria Premium', name:'Luxury Real Estate — Source Faithful PRO', accent:'#c9a96e', title:'Vive Sin Límites', cta:'Solicitar visita', points:['Fuente original preservada','Vídeo cinematográfico','Experiencia completa'] },\n        { id:'luxury-real-estate-custom-pro', icon:'LC', sector:'Inmobiliaria Premium', name:'Luxury Real Estate — Custom Blueprint PRO', accent:'#c9a96e', title:'Vive Sin Límites', cta:'Solicitar visita', points:['Vídeo e imágenes editables','Propiedades personalizables','Panel y exportación'] },"
          )

          # Replace the compact blueprint UI with support for textarea, color, range and media-slot guidance.
          Path('js/sector-blueprints-ui.js').write_text(r'''(function(){
            var state={active:false,id:null,options:{}};
            function media(){return EP.Media&&EP.Media.getAll?EP.Media.getAll():[];}
            function opts(id){if(!state.options[id]){var t=EP.SectorBlueprints.get(id),o={};EP.SectorBlueprints.getSchema(id).forEach(function(f){o[f.key]=f.default!==undefined?f.default:'';});if(o.headline!==undefined&&!o.headline)o.headline=t.title;if(o.cta!==undefined&&!o.cta)o.cta=t.cta;if(o.accent!==undefined&&!o.accent)o.accent=t.accent;state.options[id]=o;}return state.options[id];}
            function render(){var frame=document.getElementById('sb-preview-frame');if(frame)frame.srcdoc=EP.SectorBlueprints.build(state.id,media(),opts(state.id));}
            function select(id){state.id=id;opts(id);catalog();fields();render();}
            function catalog(){var box=document.getElementById('sector-blueprints-catalog');if(!box)return;var all=EP.SectorBlueprints.getAll();box.innerHTML='<div class="ss-catalog-section-header">Sector Website Blueprints - '+all.length+' módulos</div>';all.forEach(function(t){var e=document.createElement('div');e.className='ss-template-card'+(state.id===t.id?' active':'');e.setAttribute('data-sector-blueprint',t.id);e.innerHTML='<span class="ss-icon">'+t.icon+'</span><div><div class="ss-name">'+t.name+'</div><div class="ss-desc">'+t.sector+' - plantilla web completa adaptable.</div></div>';e.onclick=function(){select(t.id);};box.appendChild(e);});}
            function fields(){var box=document.getElementById('sb-props-fields'),title=document.getElementById('sb-props-title'),note=document.getElementById('sb-source-note');if(!box||!state.id)return;var t=EP.SectorBlueprints.get(state.id),o=opts(state.id),schema=EP.SectorBlueprints.getSchema(state.id);title.textContent=t.name.toUpperCase();box.innerHTML='';schema.forEach(function(f){var row=document.createElement('div');row.className='wm-field';var label=document.createElement('label');label.textContent=f.label;row.appendChild(label);var input;if(f.type==='textarea'){input=document.createElement('textarea');input.value=o[f.key]||'';}else{input=document.createElement('input');input.type=f.type==='range'?'range':(f.type||'text');input.value=o[f.key]!==undefined?o[f.key]:'';if(f.min!==undefined)input.min=f.min;if(f.max!==undefined)input.max=f.max;if(f.step!==undefined)input.step=f.step;}var val=null;if(f.type==='range'){val=document.createElement('span');val.className='val';val.textContent=input.value+(f.suffix||'');row.appendChild(input);row.appendChild(val);}else row.appendChild(input);input.oninput=function(){o[f.key]=f.type==='range'?Number(input.value):input.value;if(val)val.textContent=input.value+(f.suffix||'');render();};box.appendChild(row);});if(note){if(state.id==='luxury-real-estate-custom-pro')note.innerHTML='<strong>Media slots:</strong> 1. vídeo hero · 2. poster · 3-5. propiedades · 6. About · 7. Contacto · 8. logotipo. Todos los textos, colores y enlaces se editan arriba.';else if(state.id==='luxury-real-estate-source-faithful')note.textContent='Versión original protegida y preservada como referencia visual.';else note.textContent=state.id==='agency-studio'?'Blueprint final aislado. Slots 1-6: hero, índice y detalle de proyectos.':'Blueprint final aislado. Exporta una web cerrada, no el editor.';}}
            function activate(){if(state.active)return;state.active=true;if(EP.WebsiteModulesUI)EP.WebsiteModulesUI.deactivate();if(EP.ScrollSectionsUI)EP.ScrollSectionsUI.setMode('effects');document.body.classList.add('mode-sector-blueprints');['mode-btn-effects','mode-btn-scroll-sections','mode-btn-website-modules'].forEach(function(id){var e=document.getElementById(id);if(e)e.classList.remove('active');});document.getElementById('mode-btn-sector-blueprints').classList.add('active');document.getElementById('sector-blueprints-stage').classList.add('active');document.getElementById('sector-blueprints-props').style.display='block';if(!state.id)select(EP.SectorBlueprints.getAll()[0].id);else{catalog();fields();render();}}
            function deactivate(){state.active=false;document.body.classList.remove('mode-sector-blueprints');var p=document.getElementById('sector-blueprints-props'),b=document.getElementById('mode-btn-sector-blueprints'),s=document.getElementById('sector-blueprints-stage');if(p)p.style.display='none';if(b)b.classList.remove('active');if(s)s.classList.remove('active');}
            function download(){if(EP.PlanGate&&!EP.PlanGate.require('export',{title:'Export Blueprint bloqueado'}))return;var blob=new Blob([EP.SectorBlueprints.build(state.id,media(),opts(state.id))],{type:'text/html'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sector-blueprint-'+state.id+'.html';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);}
            function init(){document.getElementById('mode-btn-sector-blueprints').onclick=activate;['mode-btn-effects','mode-btn-scroll-sections','mode-btn-website-modules','mode-btn-rubik-tools'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('click',deactivate);});document.getElementById('sb-export-html-btn').onclick=download;}
            EP.SectorBlueprintsUI={init:init,activate:activate,deactivate:deactivate};
          })();
          ''', encoding='utf-8')

      - name: Commit wiring and remove one-off workflow
        run: |
          rm .github/workflows/wire-custom-premium-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/scroll-sections-ui.js js/sector-blueprints.js js/sector-blueprints-ui.js .github/workflows/wire-custom-premium-v2.yml
          git commit -m "feat(custom): wire three editable premium templates into panels"
          git push origin HEAD:feature/premium-storytelling-pack-v2-source-faithful
