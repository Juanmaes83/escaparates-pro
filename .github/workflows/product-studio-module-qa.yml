name: Product Studio Module QA

on:
  pull_request:
    paths:
      - 'studio.html'
      - 'projects.html'
      - 'js/studio/template-registry.js'
      - 'js/scroll-sections/*-custom-pro.js'
      - 'js/sector-blueprints/*-custom-pro.js'
      - 'js/customization/project-store-local.js'
      - 'js/projects/product-integration.js'
      - 'js/projects/studio-route.js'
      - 'js/projects/project-library-page.js'
      - 'review/phase1-studio-v2.js'
      - 'review/phase1-studio-v2.css'
      - 'review/phase2-studio-extension.js'
      - 'review/phase2-studio-extension.css'
      - 'tests/interface-utf8.spec.mjs'
      - 'tests/product-studio-module.spec.mjs'
      - 'tests/studio-template-contract.spec.mjs'
      - 'tests/phase2-contract.spec.mjs'
      - '.github/workflows/product-studio-module-qa.yml'
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate JavaScript syntax
        run: |
          node --check js/projects/product-integration.js
          node --check js/studio/template-registry.js
          node --check js/projects/studio-route.js
          node --check js/projects/project-library-page.js
          node --check js/customization/project-store-local.js
          node --check js/scroll-sections/product-storytelling-custom-pro.js
          node --check review/phase1-studio-v2.js
          node --check review/phase2-studio-extension.js
          node --check tests/interface-utf8.spec.mjs
          node --check tests/product-studio-module.spec.mjs
          node --check tests/studio-template-contract.spec.mjs
          node --check tests/phase2-contract.spec.mjs
      - name: Verify Studio contracts
        run: |
          node tests/interface-utf8.spec.mjs
          node tests/product-studio-module.spec.mjs
          node tests/studio-template-contract.spec.mjs
          node tests/phase2-contract.spec.mjs
