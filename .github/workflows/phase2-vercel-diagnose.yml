name: Phase 2 Vercel Preview Diagnose

on:
  pull_request:
    paths:
      - 'tools/phase2/vercel-preview-diagnose.mjs'
      - 'tools/phase2/resolve-vercel-preview.mjs'
      - '.github/workflows/phase2-vercel-diagnose.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve current Vercel preview
        run: node tools/phase2/resolve-vercel-preview.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Diagnose preview files
        run: node tools/phase2/vercel-preview-diagnose.mjs
      - name: Upload diagnostic result
        uses: actions/upload-artifact@v4
        with:
          name: phase2-vercel-preview-diagnose
          path: |
            tests/diagnostics/vercel-preview.json
            tests/diagnostics/matrix.json
          retention-days: 7
