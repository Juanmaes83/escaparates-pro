<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Escaparates Pro - Camera FX Premium Lab</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="pilot-shell">
        <section class="stage-panel">
            <div class="topbar">
                <div>
                    <div class="brand">Escaparates <strong>Pro</strong></div>
                    <h1>Camera FX Premium Lab</h1>
                </div>
                <div class="status" id="camera-status">Camara inactiva</div>
            </div>

            <div class="stage" id="stage">
                <canvas id="fx-canvas"></canvas>
                <div id="three-stage"></div>
                <video id="source-video" playsinline muted loop></video>
            </div>
        </section>

        <aside class="control-panel">
            <div class="section">
                <h2>Fuente</h2>
                <button id="btn-camera" class="primary">Activar camara</button>
                <label class="file-btn">
                    Subir imagen o video
                    <input id="file-input" type="file" accept="image/*,video/*">
                </label>
                <select id="camera-select" aria-label="Seleccionar camara"></select>
                <div class="hint">Usa HTTPS en movil. La camara, imagen o video alimentan todos los efectos.</div>
            </div>

            <div class="section">
                <h2>Efecto</h2>
                <div class="effect-grid">
                    <button class="effect-btn active" data-effect="pixel">Webcam Pixelation PRO</button>
                    <button class="effect-btn" data-effect="motion">Motion Detection Camera PRO</button>
                    <button class="effect-btn" data-effect="dices">Webcam Dices PRO</button>
                    <button class="effect-btn" data-effect="redlight">Red Light Green Light Camera PRO</button>
                    <button class="effect-btn" data-effect="airguitar">Air Guitar Camera PRO</button>
                    <button class="effect-btn" data-effect="pinscreen">Pin Screen Camera PRO</button>
                </div>
            </div>

            <div class="section">
                <h2>Ajustes comunes</h2>
                <label class="check"><input id="mirror" type="checkbox" checked> Espejo</label>
                <label>Brillo <input id="brightness" type="range" min="-100" max="100" value="0"></label>
                <label>Contraste <input id="contrast" type="range" min="0" max="100" value="18"></label>
                <label>Velocidad respuesta <input id="speed" type="range" min="0" max="100" value="62"></label>
            </div>

            <div class="section effect-settings" data-panel="pixel">
                <h2>Pixelation PRO</h2>
                <label>Ancho interno <input id="pixel-width" type="range" min="320" max="960" step="8" value="640"></label>
                <label>Tamano pixel <input id="pixel-size" type="range" min="4" max="34" value="10"></label>
                <label>Separacion pixel <input id="pixel-space" type="range" min="0" max="14" value="2"></label>
                <label>Alpha pixel <input id="pixel-alpha" type="range" min="20" max="100" value="100"></label>
                <label>Radio pixel <input id="pixel-radius" type="range" min="0" max="18" value="3"></label>
            </div>

            <div class="section effect-settings" data-panel="motion" hidden>
                <h2>Motion Detection PRO</h2>
                <label>Sensibilidad <input id="motion-sensitivity" type="range" min="10" max="220" value="92"></label>
                <label>Persistencia <input id="motion-trail" type="range" min="0" max="94" value="38"></label>
                <label>Umbral luz <input id="motion-threshold" type="range" min="0" max="80" value="10"></label>
                <label>Mezcla fuente <input id="motion-source" type="range" min="0" max="70" value="18"></label>
            </div>

            <div class="section effect-settings" data-panel="dices" hidden>
                <h2>Dices PRO</h2>
                <label>Columnas <input id="dice-cols" type="range" min="18" max="60" value="34"></label>
                <label>Tamano dado <input id="dice-size" type="range" min="50" max="150" value="92"></label>
                <label>Profundidad <input id="dice-depth" type="range" min="0" max="180" value="70"></label>
                <label>Framing <input id="dice-framing" type="range" min="60" max="150" value="100"></label>
            </div>

            <div class="section effect-settings" data-panel="redlight" hidden>
                <h2>Red Light Green Light PRO</h2>
                <button id="red-start">Iniciar partida</button>
                <label>Duracion partida <input id="red-duration" type="range" min="20" max="90" value="60"></label>
                <label>Sensibilidad movimiento <input id="red-sensitivity" type="range" min="25" max="220" value="92"></label>
                <label>Meta distancia <input id="red-goal" type="range" min="40" max="160" value="100"></label>
                <label>Riesgo luz roja <input id="red-risk" type="range" min="35" max="220" value="110"></label>
            </div>

            <div class="section effect-settings" data-panel="airguitar" hidden>
                <h2>Air Guitar PRO</h2>
                <button id="air-audio">Activar audio</button>
                <label>Sensibilidad rasgueo <input id="air-sensitivity" type="range" min="8" max="120" value="34"></label>
                <label>Separacion cuerdas <input id="air-strings" type="range" min="4" max="9" value="6"></label>
                <label>Distorsion visual <input id="air-glow" type="range" min="0" max="100" value="48"></label>
            </div>

            <div class="section effect-settings" data-panel="pinscreen" hidden>
                <h2>Pin Screen PRO</h2>
                <label>Resolucion pines <input id="pin-size" type="range" min="8" max="24" value="14"></label>
                <label>Profundidad pines <input id="pin-depth" type="range" min="20" max="220" value="112"></label>
                <label>Escala pines <input id="pin-scale" type="range" min="60" max="150" value="96"></label>
                <label>Framing 3D <input id="pin-framing" type="range" min="60" max="150" value="100"></label>
            </div>

            <div class="section actions">
                <button id="btn-shot">Descargar PNG</button>
                <button id="btn-reset">Reset fuente</button>
            </div>
        </aside>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
