<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Escaparates Pro - Camera FX Pilot</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="pilot-shell">
        <section class="stage-panel">
            <div class="topbar">
                <div>
                    <div class="brand">Escaparates <strong>Pro</strong></div>
                    <h1>Camera FX Pilot</h1>
                </div>
                <div class="status" id="camera-status">Camara inactiva</div>
            </div>
            <div class="stage" id="stage">
                <canvas id="fx-canvas"></canvas>
                <div id="three-stage"></div>
                <video id="source-video" playsinline muted loop></video>
            </div>
        </section>

        <aside class="control-panel">
            <div class="section">
                <h2>Fuente</h2>
                <button id="btn-camera" class="primary">Activar camara</button>
                <label class="file-btn">
                    Subir imagen o video
                    <input id="file-input" type="file" accept="image/*,video/*">
                </label>
                <select id="camera-select" aria-label="Seleccionar camara"></select>
                <div class="hint">Para movil: abre esta pagina en HTTPS y acepta el permiso de camara.</div>
            </div>

            <div class="section">
                <h2>Efecto</h2>
                <div class="effect-grid">
                    <button class="effect-btn active" data-effect="pixel">Webcam Pixelation PRO</button>
                    <button class="effect-btn" data-effect="motion">Motion Detection Camera PRO</button>
                    <button class="effect-btn" data-effect="dices">Webcam Dices PRO</button>
                </div>
            </div>

            <div class="section">
                <h2>Ajustes</h2>
                <label>Intensidad <input id="intensity" type="range" min="0" max="100" value="68"></label>
                <label>Densidad <input id="density" type="range" min="12" max="72" value="34"></label>
                <label>Contraste <input id="contrast" type="range" min="20" max="220" value="120"></label>
                <label>Velocidad <input id="speed" type="range" min="0" max="220" value="100"></label>
                <label class="check"><input id="mirror" type="checkbox" checked> Espejo</label>
            </div>

            <div class="section actions">
                <button id="btn-shot">Descargar PNG</button>
                <button id="btn-reset">Reset fuente</button>
            </div>
        </aside>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
