# Transform mages into a Grass-Like Texture

Image processing tool that converts a standard image into a textured, grass-like representation using pixel analysis and procedural rendering.

---

## How it Works

### Image Upload & Preprocessing

- Upload an image or select one from the **demo images**.
- The image is **resized** if it exceeds **2048x2048 px** to optimize performance.
- Image data is extracted into a **Uint8ClampedArray** for **faster pixel access**.

### Pixel Analysis & Grass Mapping
Each pixel is processed individually, determining:
- **Color Extraction**: The **RGB values** of the pixel are read.
- **Grass Color Mapping**: The pixel color is mapped to a **realistic grass palette**.
- **Blade Length & Orientation**: Pixel brightness and color affect **blade size, rotation, and position**.

### Grass Blade Rendering
For each pixel, **multiple grass blades** are drawn procedurally:
- **Randomization**: Grass blades have slight variations in **position, length, and rotation**.
- **Depth & Realism**: Subtle **color variations** create a natural effect.
- **Layering & Transparency**: Opacity adjustments ensure depth and more or less **realistic texture**.

### Batch Processing
- It processes images **in small batches (1000 pixels at a time)**.
- **`requestAnimationFrame()` is used** to prevent UI freezing.

### Memory Management & Cleanup
- **Asynchronous Cleanup**: Before processing a new image, **memory is freed**.
- **`stopProcess()` ensures cleanup finishes** before starting a new transformation.
- **Garbage Collection Optimization**: Large objects are released to **reduce memory leaks**.

### Final Output & Download
- The processed image is displayed in a **canvas** with a lush, grass-like texture.
- The final result **can be saved as a PNG file**.
-->
