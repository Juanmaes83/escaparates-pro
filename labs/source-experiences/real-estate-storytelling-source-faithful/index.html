<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rubik Sota — Tu nuevo hogar te espera</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            antonio: ['Antonio', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- React, ReactDOM, Framer Motion -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #0a0a0a;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .font-antonio { font-family: 'Antonio', sans-serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence, useScroll, useMotionValueEvent } = window.Motion;

    // ─── TRADUCCIONES ──────────────────────────
    const translations = {
      es: {
        phases: [
          { text: '¿Deseas ver tu hogar más de cerca?', subtext: 'Acércate a tu nueva vida.' },
          { text: 'Desciende y entra.', subtext: 'El lujo te abre sus puertas.' },
          { text: 'Genial ¿no?', subtext: 'Así podría ser tu día a día.' },
          { text: 'Llámanos, te la enseñamos.', subtext: '629554870 · Podrás quedarte allí por siempre...' },
        ],
        logo: 'RUBIK SOTA',
        footer: 'IDEA BY RUBIK SOTA 629554870',
        langLabel: 'ES',
      },
      en: {
        phases: [
          { text: 'Want to see your home closer?', subtext: 'Get closer to your new life.' },
          { text: 'Descend and enter.', subtext: 'Luxury opens its doors to you.' },
          { text: 'Amazing, right?', subtext: 'This could be your everyday.' },
          { text: 'Call us, we will show you.', subtext: '629554870 · You could stay there forever...' },
        ],
        logo: 'RUBIK SOTA',
        footer: 'IDEA BY RUBIK SOTA 629554870',
        langLabel: 'EN',
      },
    };

    // ─── ICONOS INLINE ─────────────────────────
    const ChevronDown = ({ size = 20, color = "white" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );
    const ChevronUp = ({ size = 20, color = "white" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    );

    // ─── COMPONENTE PRINCIPAL ──────────────────
    const App = () => {
      const [lang, setLang] = useState('es');
      const t = translations[lang];

      const videoRef = useRef(null);
      const durationRef = useRef(0);
      const targetTimeRef = useRef(0);
      const { scrollYProgress } = useScroll();
      const [currentPhase, setCurrentPhase] = useState(0);
      const [videoProgress, setVideoProgress] = useState(0);

      // ─── SCROLL-SCRUBBING CON FASES NARRATIVAS ──
      useMotionValueEvent(scrollYProgress, 'change', (latest) => {
        // Determinar la fase (0, 1, 2, 3)
        let phase;
        if (latest < 0.25) phase = 0;
        else if (latest < 0.5) phase = 1;
        else if (latest < 0.75) phase = 2;
        else phase = 3;
        setCurrentPhase(phase);

        // Video: 0->0.5 avanza (fase 0-2), 0.5->1 retrocede (fase 2-3)
        let videoProg;
        if (latest <= 0.5) {
          videoProg = latest * 2;
        } else {
          videoProg = (1 - latest) * 2;
        }
        setVideoProgress(videoProg);
        if (durationRef.current > 0) {
          targetTimeRef.current = videoProg * durationRef.current;
        }
      });

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        const handleLoaded = () => {
          durationRef.current = video.duration;
          video.pause();
        };
        if (video.readyState >= 1) {
          handleLoaded();
        } else {
          video.addEventListener('loadedmetadata', handleLoaded);
          return () => video.removeEventListener('loadedmetadata', handleLoaded);
        }
      }, []);

      useEffect(() => {
        let rafId;
        const loop = () => {
          const v = videoRef.current;
          if (v && durationRef.current > 0 && !v.seeking) {
            const diff = targetTimeRef.current - v.currentTime;
            if (Math.abs(diff) > 0.01) v.currentTime += diff * 0.08;
          }
          rafId = requestAnimationFrame(loop);
        };
        rafId = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafId);
      }, []);

      // ─── RENDER ───────────────────────────────
      return (
        <div className="relative w-full h-[600vh] bg-neutral-950 text-white font-inter">
          {/* Pinned wrapper */}
          <div className="sticky top-0 left-0 w-full h-screen overflow-hidden flex flex-col justify-between">
            {/* Background video */}
            <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
              <video
                ref={videoRef}
                playsInline
                muted
                preload="auto"
                className="w-full h-full object-cover scale-[1.01]"
                src="https://cdn.jiro.build/Sumon/Main%20hotel%20video.mp4"
              />
              <div className="absolute inset-0 z-10 bg-gradient-to-b from-black/60 via-transparent to-black/80" />
            </div>

            {/* Cabecera minimalista */}
            <motion.header
              initial={{ opacity: 0, y: -10 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8 }}
              className="relative z-40 flex justify-between items-center px-6 py-6 md:px-16 md:py-10 select-none"
            >
              <span className="font-antonio text-2xl tracking-[0.25em] text-white uppercase">
                {t.logo}
              </span>
              <button
                onClick={() => setLang(l => l === 'es' ? 'en' : 'es')}
                className="w-10 h-10 rounded-full bg-white/10 border border-white/20 text-white text-xs font-bold uppercase hover:bg-white/20 transition backdrop-blur-sm"
              >
                {t.langLabel}
              </button>
            </motion.header>

            {/* Texto narrativo por fases */}
            <div className="relative z-20 flex-1 flex flex-col justify-end items-center pb-12 md:pb-20 px-6">
              <AnimatePresence mode="wait">
                <motion.div
                  key={currentPhase}
                  initial={{ opacity: 0, y: 30 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: -20 }}
                  transition={{ duration: 0.7, ease: [0.16, 1, 0.3, 1] }}
                  className="text-center"
                >
                  <h2 className="font-antonio font-bold uppercase text-white tracking-wide leading-none mb-3"
                    style={{ fontSize: 'clamp(2rem, 6vw, 4.5rem)', lineHeight: '1.1' }}>
                    {t.phases[currentPhase].text}
                  </h2>
                  <p className="font-inter text-white/60 text-sm md:text-base tracking-wider">
                    {t.phases[currentPhase].subtext}
                  </p>
                </motion.div>
              </AnimatePresence>

              {/* Indicador de fase */}
              <div className="flex gap-2 mt-8">
                {[0, 1, 2, 3].map((phase) => (
                  <div
                    key={phase}
                    className={`w-2 h-2 rounded-full transition-all duration-500 ${
                      currentPhase === phase ? 'bg-white scale-125' : 'bg-white/30'
                    }`}
                  />
                ))}
              </div>
            </div>

            {/* Indicador de dirección del scroll */}
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              transition={{ delay: 1.5, duration: 0.8 }}
              className="absolute bottom-4 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-2 pointer-events-none"
            >
              <motion.span
                animate={{ y: currentPhase < 3 ? [0, 8, 0] : [0, -8, 0] }}
                transition={{ repeat: Infinity, duration: 2, ease: 'easeInOut' }}
                className="text-white/50"
              >
                {currentPhase < 3 ? <ChevronDown size={20} /> : <ChevronUp size={20} />}
              </motion.span>
            </motion.div>
          </div>

          {/* ── FOOTER ────────────────────────── */}
          <footer className="absolute bottom-0 left-0 right-0 z-50 py-6 text-center bg-neutral-950/80 backdrop-blur-sm">
            <span className="font-inter text-white/50 text-sm tracking-wider">{t.footer}</span>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

<script id="escaparates-source-bridge">
(function(){
  function decode(){
    try{
      var raw=location.hash.slice(1); if(!raw)return {};
      return JSON.parse(decodeURIComponent(escape(atob(raw))));
    }catch(e){return {}}
  }
  var cfg=decode();
  function replaceText(from,to){
    if(!to)return;
    var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
    var n; while(n=w.nextNode()) if(n.nodeValue&&n.nodeValue.indexOf(from)>-1) n.nodeValue=n.nodeValue.split(from).join(to);
  }
  function apply(){
    var v=document.querySelector('video');
    if(v&&cfg.media1&&v.getAttribute('src')!==cfg.media1){v.src=cfg.media1;v.load();}
    if(cfg.brand){replaceText('RUBIK SOTA',cfg.brand);replaceText('Rubik Sota',cfg.brand);replaceText('AURA LAB',cfg.brand);}
    if(cfg.headline){replaceText('Vive Sin',cfg.headline);replaceText('Diseñado para destacar.',cfg.headline);}
    if(cfg.productName){replaceText('AURA X',cfg.productName);}
    if(cfg.cta){replaceText('Solicitar visita',cfg.cta);replaceText('Comprar ahora',cfg.cta);}
  }
  var tries=0; var timer=setInterval(function(){apply();if(++tries>30)clearInterval(timer)},200);
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='ESCAPARATES_CONFIG'){cfg=e.data.payload||{};apply();}});
})();
</script>

</body>
</html>
